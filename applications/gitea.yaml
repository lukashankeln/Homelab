apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hankeln
  revisionHistoryLimit: 1
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
  destination:
    name: in-cluster
    namespace: gitea
  source:
    repoURL: https://dl.gitea.io/charts
    targetRevision: 12.5.2
    chart: gitea
    helm:
      valuesObject:
        deployment:
          labels:
            network-policy/egress-dns: "true"
            network-policy/ingress-controller-port: "3000"
            network-policy/egress-world: "true"
            network-policy/egress-postgres: "true"
            network-policy/egress-cluster-port-8082: "true"
            network-policy/metrics-port-3000: "true"
        strategy:
          type: Recreate
        ingress:
          enabled: true
          annotations:
            projectcontour.io/request-body-limit: "1073741824"
            cert-manager.io/cluster-issuer: letsencrypt-dns01-issuer
          className: nginx
          hosts:
            - host: git.hankeln.work
              paths:
                - path: /
                  pathType: ImplementationSpecific
          tls:
            - secretName: gitea-tls
              hosts:
                - git.hankeln.work
        persistence:
          create: false
          claimName: "gitea-volume-claim"
          volumeName: "gitea-volume"
        valkey-cluster:
          enabled: false
        postgresql-ha:
          enabled: false
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
        valkey:
          enabled: false
          global:
            valkey:
              password: changemeplease
        gitea:
          config:
            webhook:
              ALLOWED_HOST_LIST: renovate-webhooks.hankeln.work
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          additionalConfigFromEnvs:
            - name: GITEA__DATABASE__DB_TYPE
              value: postgres
            - name: GITEA__DATABASE__HOST
              value: gitea-postgresql-rw.gitea.svc.cluster.local:5432
            - name: GITEA__DATABASE__NAME
              valueFrom:
                secretKeyRef:
                  name: gitea-postgresql-app
                  key: dbname
            - name: GITEA__DATABASE__USER
              valueFrom:
                secretKeyRef:
                  name: gitea-postgresql-app
                  key: username
            - name: GITEA__DATABASE__PASSWD
              valueFrom:
                secretKeyRef:
                  name: gitea-postgresql-app
                  key: password
            - name: GITEA__DATABASE__SSL_MODE
              value: disable
