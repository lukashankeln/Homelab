apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: renovate-operator
  namespace: argocd
  finalizers:
    - resources-finalizers.argocd.argoproj.io
spec:
  project: hankeln
  revisionHistoryLimit: 1
  destination:
    name: in-cluster
    namespace: renovate-operator
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
  source:
    repoURL: https://helm.mogenius.com/public
    targetRevision: 3.7.3
    chart: renovate-operator
    helm:
      valuesObject:
        config:
          deleteSuccessfulJobs: true
          jobTTLSecondsAfterFinished: 3600
        deployment:
          podLabels:
            network-policy/metrics-port-8080: "true"
            network-policy/ingress-port-8081: "true"
            network-policy/ingress-port-8082: "true"
            network-policy/ingress-cluster-port-8082: "true"
        route:
          enabled: true
          parentRefs:
            - name: cilium-gateway
              namespace: cilium
          hostnames:
            - renovate.hankeln.work
        webhook:
          enabled: true
          route:
            enabled: true
            parentRefs:
              - name: cilium-gateway
                namespace: cilium
            hostnames:
              - renovate-webhooks.hankeln.work
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
          dashboard:
            enabled: true
            annotations:
              argocd.argoproj.io/sync-options: ServerSideApply=true
              grafana_folder: "Supporting Services"
            labels:
              grafana_dashboard: "1"
