name: "gitops-linter"
on:
  pull_request:
    branches: ["main"]

jobs:
  yamllint:
    name: "Yamllint"
    runs-on: ubuntu-latest
    container:
      image: docker-registry.hankeln.work/gitea-runner:1.2.0
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Yamllint"
        uses: karancode/yamllint-github-action@v3.0.0
        with:
          yamllint_file_or_dir: "."

  gitops-linter:
    name: "gitops linter"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: docker-registry.hankeln.work/gitea-runner:1.2.0
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - uses: lukashankeln/glint@v0.1.3
        with:
          fail-on: "error"
          upload-sarif: "false"
