apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: renovate-operator
  namespace: kube-prometheus-stack
spec:
  groups:
    - name: renovate-operator
      rules:
        - alert: RenovateProjectStalled
          expr: sum by (project, renovate_job) (increase(renovate_operator_project_executions_total[48h])) < 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Renovate project {{ $labels.project }} has not run in 48h"
            description: "RenovateJob {{ $labels.renovate_job }} has not executed project {{ $labels.project }} in the last 48 hours."
