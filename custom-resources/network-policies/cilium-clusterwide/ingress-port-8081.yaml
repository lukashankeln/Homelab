apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: ingress-port-8081
spec:
  endpointSelector:
    matchLabels:
      network-policy/ingress-port-8081: "true"
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
